name: Dolce Gusto - Preços Diários

on:
  schedule:
    - cron: '0 11 * * 1-5'  # 08:00 horário de Brasília (UTC-3), seg a sex
  workflow_dispatch:

jobs:
  scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instalar dependências
        run: pip install selenium webdriver-manager beautifulsoup4 pandas openpyxl

      - name: Instalar Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: Rodar o scraper
        run: python dolcegusto_scraper.py

      - name: Salvar planilha como artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: capsulas-dolcegusto-${{ github.run_number }}
          path: "*_dolce_gusto_capsulas_precos.xlsx"
          retention-days: 30

      - name: Salvar HTML de diagnóstico (em caso de falha)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-html-${{ github.run_number }}
          path: debug_page.html
          retention-days: 7
